kind = "web"
previewPath = "/"
title = "RobloxAI Agent"
version = "1.0.0"
id = "artifacts/roblox-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24767

[services.development]
run = "pnpm --filter @workspace/roblox-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/roblox-ai", "run", "build" ]
publicDir = "artifacts/roblox-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24767"
BASE_PATH = "/"
