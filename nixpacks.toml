[phases.setup]
nixPkgs = ["nodejs_22", "nodePackages.pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "NODE_ENV=production BASE_PATH=/ pnpm --filter @workspace/roblox-ai run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "NODE_ENV=production PORT=$PORT node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
